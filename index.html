<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SHINJUKU AREAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0e17; color: #fff; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        header h1 { font-size: 3rem; background: linear-gradient(45deg, #e50914, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: #8899aa; margin: 5px 0; }
        .brand { color: #667788; font-size: 0.9rem; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .video-card { background: #1a1a22; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #2a2a35; transition: 0.3s; }
        .video-card:hover { border-color: #e50914; transform: translateY(-5px); }
        .video-card .thumb { width: 100%; aspect-ratio: 16/9; background: #2a2a35; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .video-card h4 { margin-top: 10px; color: #fff; }
        .video-card p { color: #667788; font-size: 0.85rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1a1a22; border-radius: 20px; padding: 30px; max-width: 800px; width: 90%; border: 1px solid #2a2a35; }
        .modal-content .close { float: right; font-size: 2rem; cursor: pointer; color: #8899aa; transition: 0.3s; }
        .modal-content .close:hover { color: #fff; }
        .modal-content h3 { margin-bottom: 15px; color: #fff; }
        video { width: 100%; max-height: 70vh; border-radius: 12px; background: #000; }
        .loading { text-align: center; color: #667788; padding: 60px; grid-column: 1/-1; }
        footer { text-align: center; color: #334455; padding: 20px; margin-top: 30px; border-top: 1px solid #1a1a22; }
        .tag { color: #222; font-family: monospace; margin-top: 5px; }
        .badge { display: inline-block; background: #e50914; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; margin-left: 10px; vertical-align: middle; }
        @media (max-width: 600px) { header h1 { font-size: 2rem; } .video-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 SHINJUKU <span style="color:#e50914;background:transparent;-webkit-text-fill-color:#e50914;">AREAS</span></h1>
            <p class="sub">Stream • Watch • Request • Enjoy</p>
            <p class="brand">By <strong style="color:#00d4ff;">~GpSirEra</strong></p>
        </header>

        <div id="videoGrid" class="video-grid">
            <div class="loading">⏳ Loading videos...</div>
        </div>

        <div id="playerModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closePlayer()">&times;</span>
                <h3 id="playerTitle">Now Playing</h3>
                <video id="player" controls autoplay></video>
            </div>
        </div>

        <footer>
            <p>© 2026 <strong style="color:#e50914;">SHINJUKU AREAS</strong> • By ~GpSirEra</p>
            <p class="tag">~#gpsirAI</p>
        </footer>
    </div>

    <script>
        // ===== HF SPACE API URL =====
        const API_BASE = "https://gopallikehack-info-gpsir-era.hf.space";

        async function loadVideos() {
            const grid = document.getElementById('videoGrid');
            try {
                const res = await fetch(`${API_BASE}/videos`);
                const data = await res.json();
                if (data.videos && data.videos.length > 0) {
                    grid.innerHTML = data.videos.map(v => `
                        <div class="video-card" onclick="playVideo('${v}', '${v.replace(/\.[^.]+$/, '').replace(/_/g, ' ')}')">
                            <div class="thumb">🎬</div>
                            <h4>${v.replace(/\.[^.]+$/, '').replace(/_/g, ' ')}</h4>
                            <p>${v.split('.').pop().toUpperCase()}</p>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p style="color:#667788;text-align:center;grid-column:1/-1;">📂 No videos uploaded yet. Add to dataset!</p>';
                }
            } catch (e) {
                grid.innerHTML = '<p style="color:#ff6b6b;text-align:center;grid-column:1/-1;">❌ Failed to load videos. Check API connection.</p>';
                console.error(e);
            }
        }

        function playVideo(filename, title) {
            document.getElementById('playerTitle').textContent = title || filename;
            document.getElementById('player').src = `${API_BASE}/stream/${encodeURIComponent(filename)}`;
            document.getElementById('playerModal').classList.add('show');
        }

        function closePlayer() {
            document.getElementById('player').pause();
            document.getElementById('player').src = '';
            document.getElementById('playerModal').classList.remove('show');
        }

        document.getElementById('playerModal').addEventListener('click', function(e) {
            if (e.target === this) closePlayer();
        });

        loadVideos();
        console.log('🎬 SHINJUKU AREAS • By ~GpSirEra');
    </script>
</body>
</html>
